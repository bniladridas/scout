# SPDX-License-Identifier: MIT OR Apache-2.0
---
name: Scout

on:
  push:
    branches:
      - main
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

jobs:
  check:
    name: Scout
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - id: app-token
        name: Create Scout app token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.SCOUT_APP_ID }}
          private-key: ${{ secrets.SCOUT_APP_PRIVATE_KEY }}
          permission-checks: write
          permission-pull-requests: read
          permission-contents: read

      - name: Publish check
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail

          gh api "repos/$REPO/check-runs" \
            -X POST \
            -f name='Scout' \
            -f head_sha="$HEAD_SHA" \
            -f status='completed' \
            -f conclusion='success' \
            -f output[title]='Scout automation' \
            -f output[summary]='Scout app automation is active for this ref.' \
            --silent
